<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily URLs - Moods Dinámicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #ffffff;
            --accent: #000;
            --sketch-border: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        /* Colores por Mood */
        body.mood-relax { --bg-color: #e8f5e9; }
        body.mood-work { --bg-color: #ffebee; }
        body.mood-study { --bg-color: #e3f2fd; }
        body.mood-libre { --bg-color: #f5f5f5; }

        body {
            font-family: 'Gochi Hand', cursive;
            background-color: var(--bg-color);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        header { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; }
        
        .panel {
            background: #fff;
            border: 3px solid var(--accent);
            border-radius: var(--sketch-border);
            width: 100%;
            max-width: 600px;
            min-height: 400px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
        }

        .mood-indicator { text-transform: uppercase; font-size: 1.2rem; margin-bottom: 10px; color: #666; }

        .fila-link { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        
        input[type="text"] {
            font-family: 'Gochi Hand';
            border: none;
            border-bottom: 2px solid #000;
            outline: none;
            background: transparent;
            font-size: 1.1rem;
        }
        .in-titulo { width: 30%; }
        .in-url { width: 50%; color: #555; }

        .btn {
            font-family: 'Gochi Hand';
            cursor: pointer;
            border: 2px solid #000;
            background: #fff;
            border-radius: var(--sketch-border);
            padding: 5px 15px;
            font-size: 1.1rem;
        }
        .btn-open { background: #000; color: #fff; margin-left: 10px; }

        .footer-moods { display: flex; gap: 30px; margin-top: 40px; justify-content: center; flex-wrap: wrap; }
        .mood-btn { text-align: center; cursor: pointer; width: 90px; transition: 0.2s; }
        .mood-btn:hover { transform: scale(1.1); }
        .mood-btn img { width: 100%; height: auto; border-radius: 5px; }
        
        /* Sidebar */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 10; top: 0; left: 0; background: #000; color: #fff; overflow-x: hidden; transition: 0.4s; padding-top: 60px; }
        .sidebar a { padding: 10px 30px; text-decoration: none; color: #ccc; display: block; font-size: 1.5rem; }
        .sidebar .close { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; }

    </style>
</head>
<body class="mood-libre">

    <div id="sidebar" class="sidebar">
        <span class="close" onclick="closeMenu()">×</span>
        <a href="#" onclick="cambiarMood('libre')">Panel Central (Libre)</a>
        <a href="#" onclick="limpiarStorage()">Reiniciar Todo</a>
    </div>

    <header>
        <div style="font-size: 2rem; cursor: pointer;" onclick="openMenu()">☰</div>
        <h1 id="main-title">Daily Url's</h1>
        <div style="width: 40px;"></div>
    </header>

    <div class="panel">
        <div class="mood-indicator" id="mood-label">Modo: Libre</div>
        <div id="lista-links"></div>
        
        <div style="margin-top: 20px; display: flex; justify-content: space-between;">
            <button class="btn" onclick="agregarLink()">+ Agregar</button>
            <button class="btn btn-open" onclick="abrirSeleccionados()">🚀 Abrir Checkeados</button>
        </div>
    </div>

    <div class="footer-moods">
        <div class="mood-btn" onclick="cambiarMood('relax')">
            <img src="flork_musica.jpg" alt="Relax">
            <p>Relax</p>
        </div>
        <div class="mood-btn" onclick="cambiarMood('work')">
            <img src="flork_llorando_compu.jpg" alt="Work">
            <p>Work</p>
        </div>
        <div class="mood-btn" onclick="cambiarMood('study')">
            <img src="flork_confundido.jpg" alt="Study">
            <p>Study</p>
        </div>
    </div>

    <script>
        // Estructura de datos: un objeto que contiene listas para cada mood
        let datosApp = JSON.parse(localStorage.getItem('flork_data')) || {
            currentMood: 'libre',
            listas: {
                libre: [],
                relax: [],
                work: [],
                study: []
            }
        };

        function render() {
            const mood = datosApp.currentMood;
            document.body.className = 'mood-' + mood;
            document.getElementById('mood-label').innerText = 'Modo: ' + mood;
            
            const contenedor = document.getElementById('lista-links');
            contenedor.innerHTML = '';

            datosApp.listas[mood].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'fila-link';
                div.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="updateItem(${index}, 'checked', this.checked)">
                    <input type="text" class="in-titulo" placeholder="Título" value="${item.titulo}" oninput="updateItem(${index}, 'titulo', this.value)">
                    <input type="text" class="in-url" placeholder="URL (ej: google.com)" value="${item.url}" oninput="updateItem(${index}, 'url', this.value)">
                    <span style="cursor:pointer" onclick="eliminarLink(${index})">🗑️</span>
                `;
                contenedor.appendChild(div);
            });
            save();
        }

        function agregarLink() {
            datosApp.listas[datosApp.currentMood].push({ titulo: '', url: '', checked: true });
            render();
        }

        function updateItem(index, campo, valor) {
            datosApp.listas[datosApp.currentMood][index][campo] = valor;
            save();
        }

        function eliminarLink(index) {
            datosApp.listas[datosApp.currentMood].splice(index, 1);
            render();
        }

        function cambiarMood(nuevoMood) {
            datosApp.currentMood = nuevoMood;
            render();
            closeMenu();
        }

        function abrirSeleccionados() {
            const linksParaAbrir = datosApp.listas[datosApp.currentMood].filter(l => l.checked && l.url);
            
            if (linksParaAbrir.length === 0) return alert("No hay links seleccionados o con URL válida.");

            linksParaAbrir.forEach(link => {
                let url = link.url.trim();
                if (!url.match(/^https?:\/\//i)) {
                    url = 'https://' + url;
                }
                // Intento de apertura
                const win = window.open(url, '_blank');
                if (!win) {
                    alert("¡Atención! Tu navegador bloqueó las pestañas. Por favor, permití los 'pop-ups' para este sitio.");
                }
            });
        }

        function save() {
            localStorage.setItem('flork_data', JSON.stringify(datosApp));
        }

        function openMenu() { document.getElementById("sidebar").style.width = "250px"; }
        function closeMenu() { document.getElementById("sidebar").style.width = "0"; }

        function limpiarStorage() {
            if(confirm("¿Borrar todos los links de todos los modos?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Carga inicial
        render();
    </script>
</body>
</html>
