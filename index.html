<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily URLs - Doodle Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --panel-bg: #ffffff;
            --accent-color: #000000;
            --border-sketch: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        /* Modos de Color */
        body.mood-relax { --bg-color: #e3f2fd; }
        body.mood-work { --bg-color: #ccc8c9; }
        body.mood-study { --bg-color: #77747a; }

        body {
            font-family: 'Gochi Hand', cursive;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-hamburguesa {
            font-size: 30px;
            cursor: pointer;
            padding: 10px;
        }

        h1 { font-size: 2.5rem; margin: 10px 0; }

        /* Panel Central */
        .panel-container {
            background: var(--panel-bg);
            border: 3px solid var(--accent-color);
            border-radius: var(--border-sketch);
            width: 100%;
            max-width: 600px;
            min-height: 350px;
            padding: 30px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            position: relative;
        }

        .lista-links {
            margin-bottom: 20px;
        }

        .fila-link {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #ccc;
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            cursor: pointer;
        }

        .input-doodle {
            font-family: 'Gochi Hand';
            font-size: 1.1rem;
            border: none;
            border-bottom: 2px solid #333;
            outline: none;
            padding: 2px 5px;
            background: transparent;
        }

        .input-titulo { width: 30%; font-weight: bold; }
        .input-url { width: 55%; color: #666; }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
        }
        .btn-delete:hover { opacity: 1; }

        /* Botones de acción */
        .acciones {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-main {
            font-family: 'Gochi Hand';
            font-size: 1.2rem;
            padding: 8px 15px;
            cursor: pointer;
            border: 2px solid #000;
            background: #fff;
            border-radius: var(--border-sketch);
            transition: transform 0.1s;
        }

        .btn-main:active { transform: scale(0.95); }
        .btn-open { background: #000; color: #fff; }

        /* Footer con Florks */
        .mood-selector {
            display: flex;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mood-card {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100px;
        }

        .mood-card:hover { transform: translateY(-10px); }

        .mood-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .mood-card p { margin-top: 5px; font-size: 1.2rem; }

        /* Sidebar */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 10;
            top: 0;
            left: 0;
            background-color: #111;
            color: white;
            overflow-x: hidden;
            transition: 0.4s;
            padding-top: 60px;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 20px;
            color: #818181;
            display: block;
        }

        .sidebar .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
        }
    </style>
</head>
<body class="mood-work">

    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
        <h2 style="padding-left: 25px;">Configuración</h2>
        <a href="#" onclick="limpiarTodo()">Borrar todo</a>
        <a href="#" onclick="toggleNav()">Cerrar</a>
    </div>

    <header>
        <div class="menu-hamburguesa" onclick="toggleNav()">☰</div>
        <h1>Daily Url's</h1>
        <div style="width: 40px;"></div> </header>

    <div class="panel-container">
        <div id="lista-links" class="lista-links">
            </div>

        <div class="acciones">
            <button class="btn-main" onclick="agregarNuevoLink()">+ Agregar</button>
            <button class="btn-main btn-open" onclick="abrirLinks()">🚀 Abrir</button>
        </div>
    </div>

    <div class="mood-selector">
        <div class="mood-card" onclick="cambiarMood('relax')">
            <img src="flork_musica.jpg" alt="Relax">
            <p>Relax</p>
        </div>
        <div class="mood-card" onclick="cambiarMood('work')">
            <img src="flork_llorando_compu.jpg" alt="Work">
            <p>Work</p>
        </div>
        <div class="mood-card" onclick="cambiarMood('study')">
            <img src="flork_confundido.jpg" alt="Study">
            <p>Study</p>
        </div>
    </div>

    <script>
        // Datos iniciales o cargados de LocalStorage
        let baseDeDatos = JSON.parse(localStorage.getItem('doodleLinks')) || [
            { id: Date.now(), titulo: 'Mi Web', url: 'https://google.com', activo: true }
        ];

        // Función para renderizar la lista
        function dibujarLista() {
            const contenedor = document.getElementById('lista-links');
            contenedor.innerHTML = '';

            baseDeDatos.forEach(link => {
                const div = document.createElement('div');
                div.className = 'fila-link';
                div.innerHTML = `
                    <input type="checkbox" ${link.activo ? 'checked' : ''} onchange="toggleCheck(${link.id})">
                    <input type="text" class="input-doodle input-titulo" value="${link.titulo}" placeholder="Nombre" oninput="editarLink(${link.id}, 'titulo', this.value)">
                    <input type="text" class="input-doodle input-url" value="${link.url}" placeholder="URL" oninput="editarLink(${link.id}, 'url', this.value)">
                    <button class="btn-delete" onclick="borrarLink(${link.id})">✖</button>
                `;
                contenedor.appendChild(div);
            });
            
            // Guardar siempre en el navegador
            localStorage.setItem('doodleLinks', JSON.stringify(baseDeDatos));
        }

        function agregarNuevoLink() {
            baseDeDatos.push({
                id: Date.now(),
                titulo: '',
                url: '',
                activo: true
            });
            dibujarLista();
        }

        function editarLink(id, campo, valor) {
            const index = baseDeDatos.findIndex(l => l.id === id);
            baseDeDatos[index][campo] = valor;
            localStorage.setItem('doodleLinks', JSON.stringify(baseDeDatos));
        }

        function toggleCheck(id) {
            const index = baseDeDatos.findIndex(l => l.id === id);
            baseDeDatos[index].activo = !baseDeDatos[index].activo;
            localStorage.setItem('doodleLinks', JSON.stringify(baseDeDatos));
        }

        function borrarLink(id) {
            baseDeDatos = baseDeDatos.filter(l => l.id !== id);
            dibujarLista();
        }

        function abrirLinks() {
            const seleccionados = baseDeDatos.filter(l => l.activo && l.url !== '');
            if (seleccionados.length === 0) return alert("Selecciona links válidos primero");
            
            seleccionados.forEach(link => {
                let url = link.url;
                if (!url.startsWith('http')) url = 'https://' + url;
                window.open(url, '_blank');
            });
        }

        // Cambio de "Mood"
        function cambiarMood(mood) {
            document.body.className = 'mood-' + mood;
        }

        // Sidebar logic
        function toggleNav() {
            const sidebar = document.getElementById("mySidebar");
            sidebar.style.width = sidebar.style.width === "250px" ? "0" : "250px";
        }

        function limpiarTodo() {
            if(confirm("¿Seguro que quieres borrar todos los links?")) {
                baseDeDatos = [];
                dibujarLista();
                toggleNav();
            }
        }

        // Carga inicial
        dibujarLista();
    </script>
</body>
</html>
