<head>
<meta charset="UTF-8">
<title>Mi Panel</title>

<!-- Fuente manuscrita -->
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Patrick Hand', cursive;
  background: #f1f1f1;
  padding: 20px;
  margin: 0;
}

/* ✨ TÍTULO */
h1 {
  text-align: center;
  font-family: 'Permanent Marker', cursive;
  font-size: 70px;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

/* BOTONES */
.btn {
  border: 2px solid black;
  background: white;
  padding: 8px 12px;
  cursor: pointer;
  font-family: 'Patrick Hand', cursive;
}

/* CONTENEDOR CATEGORÍA */
.categoria {
  display: flex;
  gap: 20px;
  border: 2px solid black;
  background: white;
  padding: 20px;
  margin-top: 20px;
  align-items: center;
  flex-wrap: wrap; /* 🔥 clave responsive */
}

/* IMAGEN */
.categoria img {
  width: 120px;
}

/* LINKS */
.links {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.link-btn {
  border: 2px solid black;
  padding: 8px;
  cursor: pointer;
  background: white;
}

/* EDITOR */
#editor {
  margin-top: 30px;
  border: 2px dashed black;
  padding: 20px;
  background: white;
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 6px;
  border: 2px solid black;
  font-family: 'Patrick Hand', cursive;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {

  h1 {
    font-size: 40px;
  }

  .categoria {
    flex-direction: column;
    align-items: flex-start;
  }

  .categoria img {
    width: 80px;
  }

}

</style>
</head>
